<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        body { background: #1c1c1c; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { background: #248bcf; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }

    <script>window.Telegram.WebApp.expand();</script>

</html>
