<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid #333; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #2a2a2a; padding: 10px; border-radius: 12px; font-weight: bold; border: 1px solid #444; }
        .btn-main { background: linear-gradient(135deg, #ff9800, #f44336); color: white; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        h2 { color: #ff9800; margin-top: 0; }
        .log { font-size: 0.9rem; color: #888; margin-top: 15px; height: 40px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Королевство 🏰</h2>
        <div class="stat-grid">
            <div class="stat-box">💰 <span id="gold">0</span></div>
            <div class="stat-box">⭐ Ур. <span id="lvl">1</span></div>
        </div>
        <button class="btn-main" onclick="farm()">РАБОТАТЬ</button>
        <div class="log" id="log">Нажмите на кнопку, чтобы начать...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Загрузка данных
        let gold = int(localStorage.getItem('gold')) || 0;
        let lvl = int(localStorage.getItem('lvl')) || 1;

        function updateUI() {
            document.getElementById('gold').innerText = gold;
            document.getElementById('lvl').innerText = lvl;
            localStorage.setItem('gold', gold);
            localStorage.setItem('lvl', lvl);
        }

        function int(val) { return parseInt(val); }

        function farm() {
            gold += 1;
            if (gold % 50 === 0) {
                lvl += 1;
                tg.HapticFeedback.notificationOccurred('success');
                document.getElementById('log').innerText = "Уровень повышен! +1 к званию";
            } else {
                tg.HapticFeedback.impactOccurred('light');
                document.getElementById('log').innerText = "Вы заработали 1 золотой";
            }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
